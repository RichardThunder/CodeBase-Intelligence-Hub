name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PYTHON_VERSION: "3.11"

jobs:
  lint-and-format:
    name: Lint & Format Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: pip install --no-cache-dir uv

      - name: Install dependencies
        run: uv sync

      - name: Lint with ruff
        run: uv run ruff check .
        continue-on-error: true

      - name: Format check with ruff
        run: uv run ruff format . --check
        continue-on-error: true

  type-check:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: pip install --no-cache-dir uv

      - name: Install dependencies
        run: uv sync

      - name: Type check with pyright
        run: uv run pyright . --version
        continue-on-error: true

  build:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: [ lint-and-format, type-check ]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: pip install --no-cache-dir uv

      - name: Cache uv environment
        uses: actions/cache@v3
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('**/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install dependencies
        run: uv sync

      - name: Verify imports
        run: |
          uv run python -c "from config.settings import Settings; print('✓ Config OK')"
          uv run python -c "from retrieval.pipeline import build_ensemble_retriever; print('✓ Retrieval OK')"
          uv run python -c "from graph.builder import build_graph; print('✓ Graph OK')"
          uv run python -c "from api.routes import create_routes; print('✓ API OK')"
          uv run python -c "from memory.simple import SessionMemory; print('✓ Memory OK')"

      - name: Verify main.py runs
        run: uv run python main.py
        continue-on-error: true

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./docker/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: pip install --no-cache-dir uv

      - name: Install dependencies
        run: uv sync

      - name: Scan with bandit
        run: uv run bandit -r . -ll -i
        continue-on-error: true

      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
        continue-on-error: true

  notify:
    name: Notification
    runs-on: ubuntu-latest
    needs: [ lint-and-format, type-check, build, docker-build, security-scan ]
    if: always()

    steps:
      - name: Check job status
        run: |
          if [ "${{ needs.build.result }}" = "success" ]; then
            echo "✅ Build pipeline successful!"
            exit 0
          else
            echo "❌ Build pipeline failed!"
            exit 1
          fi
        continue-on-error: true

      - name: Comment PR on failure
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ CI/CD pipeline failed. Please check the workflow logs.'
            })
